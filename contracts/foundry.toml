# Foundry config for Frost / Port-42 contracts.
# See https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

# Pinned via spike record: Base Sepolia + MetaMask Delegation Framework
# both deploy under 0.8.26; matches the version used to compile Emitter.sol
# in spikes/04-event-webhook-latency/.
solc_version = "0.8.26"
evm_version = "cancun"

optimizer = true
optimizer_runs = 200

# Property tests are explicitly called for in contract-architecture.md
# §2.5 and §9. Bump default fuzz runs so I-01/I-14/I-15/I-17 actually
# explore the parameter space.
fuzz = { runs = 512 }
invariant = { runs = 64, depth = 32, fail_on_revert = false }

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
